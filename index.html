<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Endless runner móvil inspirado en San Fermín: corre delante de los toros y evita obstáculos."
    />
    <meta name="theme-color" content="#7f1d1d" />

    <title>San Fermín Run</title>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="./favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="San Fermín Run" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>

  <body class="min-h-screen overflow-hidden bg-stone-950 text-white antialiased">
    <div id="app" class="flex min-h-screen items-center justify-center p-3">
      <main
        class="relative aspect-[9/16] max-h-[calc(100vh-1.5rem)] w-full max-w-[430px] overflow-hidden rounded-lg border border-white/15 bg-red-950 shadow-2xl shadow-black/45"
        aria-label="San Fermín Run"
      >
        <canvas
          id="game-canvas"
          class="block h-full w-full touch-none bg-red-950"
          width="540"
          height="960"
          aria-label="Juego endless runner de San Fermín"
        ></canvas>

        <div
          id="hud"
          class="pointer-events-none absolute inset-x-0 top-0 flex items-start justify-between gap-2 p-3"
          hidden
        >
          <div class="rounded-md bg-black/55 px-3 py-2 text-sm font-black backdrop-blur">
            <span data-i18n="time">Tiempo</span>
            <span id="time" class="ml-1 tabular-nums">00:00.0</span>
          </div>
          <div class="rounded-md bg-black/55 px-3 py-2 text-sm font-black backdrop-blur">
            <span data-i18n="record">Récord</span>
            <span id="level-best-time" class="ml-1 tabular-nums">00:00.0</span>
          </div>
          <button
            id="menu-button"
            class="pointer-events-auto rounded-md bg-white/90 px-3 py-2 text-sm font-black text-red-950 shadow focus:outline-none focus:ring-4 focus:ring-red-200"
            type="button"
            data-i18n="menu"
          >
            Menú
          </button>
        </div>

        <div
          id="overlay"
          class="absolute inset-0 flex items-center justify-center bg-red-950/78 p-5 backdrop-blur-sm"
        >
          <section id="start-panel" class="w-full max-w-[320px] text-center">
            <p class="text-sm font-black uppercase tracking-[0.22em] text-amber-200">San Fermín</p>
            <h1 data-title class="mt-2 text-4xl font-black leading-none">San Fermín Run</h1>
            <p data-i18n="subtitle" class="mt-3 text-base font-semibold text-white/85">
              Corre delante de los toros
            </p>
            <p data-i18n="startHint" class="mt-4 text-sm leading-relaxed text-white/75">
              Toca o desliza hacia arriba para saltar. También puedes usar espacio o flecha arriba.
            </p>

            <div class="mt-6 text-left">
              <label class="block text-xs font-bold uppercase tracking-wide text-white/75">
                <span data-i18n="language">Idioma</span>
                <select
                  id="language-select"
                  class="mt-1 w-full rounded-md bg-white p-2 text-red-950"
                >
                  <option value="es">Español</option>
                  <option value="en">English</option>
                </select>
              </label>
            </div>
            <select id="runner-select" hidden tabindex="-1" aria-hidden="true">
              <option value="male" data-i18n="maleRunner">Hombre</option>
              <option value="female" data-i18n="femaleRunner">Mujer</option>
            </select>
            <select id="difficulty-select" hidden tabindex="-1" aria-hidden="true">
              <option value="easy" data-i18n="easy" selected>Suave</option>
              <option value="normal" data-i18n="normal">Normal</option>
              <option value="hard" data-i18n="hard">Valiente</option>
            </select>

            <div class="mt-6 flex gap-3">
              <button
                id="play-button"
                class="min-h-12 flex-1 rounded-md bg-white px-5 font-black text-red-950 transition active:scale-95 focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-i18n="play"
              >
                Jugar
              </button>
              <button
                id="share-button"
                class="min-h-12 flex-1 rounded-md bg-amber-300 px-5 font-black text-red-950 transition active:scale-95 focus:outline-none focus:ring-4 focus:ring-amber-100"
                type="button"
                data-i18n="share"
              >
                Compartir
              </button>
            </div>
            <p class="mt-5 text-sm font-bold text-white/80">
              <span data-i18n="record">Récord</span>
              <span id="best-time" class="tabular-nums">00:00.0</span>
            </p>
          </section>

          <section id="runner-panel" class="w-full max-w-[320px] text-center" hidden>
            <h2 data-i18n="chooseRunner" class="text-3xl font-black">Elige corredor</h2>
            <div class="mt-6 grid grid-cols-2 gap-3">
              <button
                class="runner-choice min-h-44 rounded-md bg-white/95 p-3 text-red-950 shadow focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-runner="male"
              >
                <img
                  data-runner-preview="male"
                  class="mx-auto h-24 w-24 object-contain [image-rendering:pixelated]"
                  alt=""
                />
                <span data-i18n="maleRunner" class="mt-3 block font-black">Hombre</span>
              </button>
              <button
                class="runner-choice min-h-44 rounded-md bg-white/95 p-3 text-red-950 shadow focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-runner="female"
              >
                <img
                  data-runner-preview="female"
                  class="mx-auto h-24 w-24 object-contain [image-rendering:pixelated]"
                  alt=""
                />
                <span data-i18n="femaleRunner" class="mt-3 block font-black">Mujer</span>
              </button>
            </div>
            <button
              class="home-button mt-5 min-h-12 w-full rounded-md bg-red-800 px-5 font-black text-white focus:outline-none focus:ring-4 focus:ring-red-300"
              type="button"
              data-i18n="back"
            >
              Volver
            </button>
          </section>

          <section id="difficulty-panel" class="w-full max-w-[320px] text-center" hidden>
            <h2 data-i18n="chooseDifficulty" class="text-3xl font-black">Elige nivel</h2>
            <div class="mt-6 grid gap-3">
              <button
                class="difficulty-choice min-h-12 rounded-md bg-white px-5 font-black text-red-950 focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-difficulty="easy"
                data-i18n="easy"
              >
                Suave
              </button>
              <button
                class="difficulty-choice min-h-12 rounded-md bg-amber-300 px-5 font-black text-red-950 focus:outline-none focus:ring-4 focus:ring-amber-100"
                type="button"
                data-difficulty="normal"
                data-i18n="normal"
              >
                Normal
              </button>
              <button
                class="difficulty-choice min-h-12 rounded-md bg-red-800 px-5 font-black text-white focus:outline-none focus:ring-4 focus:ring-red-300"
                type="button"
                data-difficulty="hard"
                data-i18n="hard"
              >
                Valiente
              </button>
            </div>
            <button
              id="runner-back-button"
              class="mt-5 min-h-12 w-full rounded-md bg-white/15 px-5 font-black text-white focus:outline-none focus:ring-4 focus:ring-red-300"
              type="button"
              data-i18n="back"
            >
              Volver
            </button>
          </section>

          <section id="pause-panel" class="w-full max-w-[280px] text-center" hidden>
            <h2 data-i18n="paused" class="text-3xl font-black">Pausa</h2>
            <div class="mt-6 grid gap-3">
              <button
                id="continue-button"
                class="min-h-12 rounded-md bg-white px-5 font-black text-red-950 focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-i18n="continue"
              >
                Continuar
              </button>
              <button
                class="restart-button min-h-12 rounded-md bg-amber-300 px-5 font-black text-red-950 focus:outline-none focus:ring-4 focus:ring-amber-100"
                type="button"
                data-i18n="restart"
              >
                Reiniciar
              </button>
              <button
                id="home-button"
                class="min-h-12 rounded-md bg-red-800 px-5 font-black text-white focus:outline-none focus:ring-4 focus:ring-red-300"
                type="button"
                data-i18n="home"
              >
                Inicio
              </button>
            </div>
          </section>

          <section id="game-over-panel" class="w-full max-w-[280px] text-center" hidden>
            <h2 data-i18n="gameOverTitle" class="text-3xl font-black">¡Te han pillado!</h2>
            <p data-i18n="gameOverMessage" class="mt-3 text-sm text-white/75">
              Los toros alcanzaron al corredor.
            </p>
            <div class="mt-6 grid gap-3">
              <button
                class="restart-button min-h-12 rounded-md bg-white px-5 font-black text-red-950 focus:outline-none focus:ring-4 focus:ring-amber-200"
                type="button"
                data-i18n="restart"
              >
                Reiniciar
              </button>
              <button
                class="home-button min-h-12 rounded-md bg-red-800 px-5 font-black text-white focus:outline-none focus:ring-4 focus:ring-red-300"
                type="button"
                data-i18n="home"
              >
                Inicio
              </button>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="./src/js/app.js"></script>
  </body>
</html>
